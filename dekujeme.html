<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Děkujeme za zprávu | janAGI</title>
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF57B9;
            --dark: #0F0F1A;
            --darker: #060611;
            --text: #F0F0FF;
            --gradient-accent: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        
        .thanks-container {
            max-width: 600px;
            padding: 3rem;
            background: rgba(25, 25, 40, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
        }
        
        .icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: block;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        
        .button {
            background: var(--gradient-accent);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
        }
        
        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
        }
        
        /* Glow effect */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.4;
        }
        
        .glow-1 {
            top: 20%;
            left: 20%;
            width: 300px;
            height: 300px;
            background: var(--primary);
        }
        
        .glow-2 {
            bottom: 20%;
            right: 20%;
            width: 400px;
            height: 400px;
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <div class="thanks-container">
        <div class="icon">✉️</div>
        <h1>Děkujeme za váš zájem</h1>
        <p>Vaše zpráva byla úspěšně odeslána. Ozveme se vám co nejdříve.</p>
        <a href="index.html" class="button">Zpět na hlavní stránku</a>
    </div>
    
    <script>
        // Automatický návrat na hlavní stránku po 10 sekundách
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>
</html>
